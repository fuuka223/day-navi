    formats:
      default: "%Y/%m/%d %H:%M:%S"
      long: "%Y年%m月%d日 %H時%M分%S秒"
      short: "%m/%d %H:%M"
  date:
    formats:
      default: "%Y/%m/%d"
      long: "%Y年%m月%d日"
      short: "%m/%d"
  errors:
