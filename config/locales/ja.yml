ja:
  time:
    formats:
      default: "%Y/%m/%d %H:%M:%S"
      long: "%Y年%m月%d日 %H時%M分%S秒"
      short: "%m/%d %H:%M"
  date:
    formats:
      default: "%Y/%m/%d"
      long: "%Y年%m月%d日"
      short: "%m/%d"
  errors:
    format: "%{attribute}%{message}"
    messages:
      blank: を入力してください
      too_long: は%{count}文字以内で入力してください
      too_short: は%{count}文字以上で入力してください
      inclusion: は一覧にありません
      required: を入力してください
      taken: はすでに存在します
      invalid: は不正な値です
      confirmation: と%{attribute}の入力が一致しません

  activerecord:
    errors:
      format: "%{attribute}%{message}"
      models:
        task:
          format: "%{attribute}%{message}"
        user:
          format: "%{attribute}%{message}"
    models:
      task: タスク
      user: ユーザー
      schedule: 予定
    attributes:
      task:
        title: タイトル
        content: 内容
        priority_level: 優先度
        is_completed: 完了ステータス
        deadline: 期限
        user: ユーザー
      user:
        nickname: ニックネーム
        email: メールアドレス
        password: パスワード
        password_confirmation: パスワード（確認用）
      schedule:
        title: タイトル
        content: 内容
        start_time: 開始時間
        end_time: 終了時間
        user: ユーザー
    errors:
      messages:
        required: を入力してください

  devise:
    registrations:
      destroyed: "アカウントを削除しました"
    sessions:
      signed_in: "ログインしました"
      signed_out: "ログアウトしました"
    failure:
      unauthenticated: "ログインしてください"